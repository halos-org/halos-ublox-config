name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    uses: halos-org/shared-workflows/.github/workflows/publish-release.yml@main
    with:
      package-name: halos-ublox-config
      apt-distro: trixie
      apt-component: main
    secrets:
      APT_REPO_PAT: ${{ secrets.APT_REPO_PAT }}
